<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pomodoro Timer</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div id="app" data-mode="work">
      <section class="timer" aria-label="Pomodoro timer">
        <div class="mode-tabs" role="tablist" aria-label="Timer mode">
          <button type="button" class="mode-tab is-active" id="tab-work" role="tab" aria-selected="true">Pomodoro</button>
          <button type="button" class="mode-tab" id="tab-break" role="tab" aria-selected="false">Short Break</button>
          <button type="button" class="mode-tab" id="tab-long-break" role="tab" aria-selected="false">Long Break</button>
        </div>
        <p class="mode-indicator" id="mode-indicator">Work</p>
        <time class="time-display" id="time-display" datetime="PT25M00S">25:00</time>
        <div class="controls">
          <button type="button" class="btn btn-primary" id="start-pause-btn">Start</button>
          <button type="button" class="btn btn-secondary" id="reset-btn">Reset</button>
          <button type="button" class="btn btn-secondary btn-icon" id="settings-toggle-btn" aria-label="Toggle settings" aria-expanded="false">⚙</button>
        </div>
      </section>
      <section class="task-panel" aria-label="Task list">
        <h2 class="task-panel-title">Tasks</h2>
        <div class="task-input-row">
          <input class="task-input" type="text" id="task-input"
                 placeholder="Add a task…" maxlength="80">
          <button type="button" class="btn btn-primary" id="add-task-btn">Add</button>
        </div>
        <ul class="task-list" id="task-list"></ul>
      </section>
    </div>
    <div class="modal-overlay" id="settings-modal" role="dialog" aria-modal="true" aria-label="Timer settings" hidden>
      <div class="modal">
        <div class="modal-header">
          <h2 class="modal-title">Settings</h2>
          <button type="button" class="btn btn-icon modal-close-btn" id="settings-close-btn" aria-label="Close settings">✕</button>
        </div>
        <section class="settings-panel" aria-label="Timer settings">
          <div class="setting">
            <label class="setting-label" for="work-duration-input">Work (minutes)</label>
            <input class="setting-input" type="number" id="work-duration-input"
                   min="1" max="60" value="25">
          </div>
          <div class="setting">
            <label class="setting-label" for="break-duration-input">Short Break (minutes)</label>
            <input class="setting-input" type="number" id="break-duration-input"
                   min="1" max="60" value="5">
          </div>
          <div class="setting">
            <label class="setting-label" for="long-break-duration-input">Long Break (minutes)</label>
            <input class="setting-input" type="number" id="long-break-duration-input"
                   min="1" max="60" value="15">
          </div>
        </section>
      </div>
    </div>
  </body>
</html>
